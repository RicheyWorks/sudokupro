# Full CI (AUDIT P1-6): build, run the entire test suite, and prove the Docker
# image actually builds. Replaces test-constants.yml, which exercised one test.
name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Full suite across all modules (model/server/client) — server tests run
      # on H2 via the test profile, no services needed.
      - name: Build and test
        run: mvn -B verify

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sudokupro:${{ github.sha }} .

  # Release: on a version tag (v*), publish the server jar as a GitHub Release
  # and push the Docker image to GHCR tagged with the version.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      packages: write   # push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build server jar
        run: mvn -B -DskipTests -pl server -am package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGE=ghcr.io/${{ github.repository_owner }}/sudokupro
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker build -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: server/target/sudokupro-server-*-exec.jar
