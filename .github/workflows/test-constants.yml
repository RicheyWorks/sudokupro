name: Test Constants Integrity

# Trigger on push or pull request
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Check out your code
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Java 17 (matches your project)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Run the tests
      - name: Test Constants
        run: mvn test -Dtest=ConstantsTest