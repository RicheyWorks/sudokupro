# Local/staging stack: app + Postgres + Redis. (AUDIT P1-6)
#
# Usage: copy .env.example to .env, set real values, then `docker compose up --build`.
# The app runs with the prod profile, so SecretsGuard refuses placeholder or
# well-known passwords — pick real ones even locally.
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/sudokupro
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Flyway creates/migrates the schema on startup; Hibernate only validates.
      DDL_AUTO: ${DDL_AUTO:-validate}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sudokupro
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sudokupro"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
