# Test profile (AUDIT P1-1) — activated via @ActiveProfiles("test").
# In-memory H2 in PostgreSQL compatibility mode so context tests run anywhere,
# no local Postgres required. Replaces the old test-application.properties,
# which was never loaded (not a Spring convention filename).
spring.datasource.url=jdbc:h2:mem:sudokupro-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.redis.host=localhost
spring.redis.port=6379
