# ─── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sudokupro}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# DDL strategy: "validate" in production so Hibernate never silently alters schema.
# Set to "update" locally by overriding in application-local.properties or the env var.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}

# ─── Redis ──────────────────────────────────────────────────────────────────────
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# ─── Spring Security default user (dev/test only — override in prod) ───────────
# In production remove these entirely and provision real accounts via the DB.
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD}
spring.security.user.roles=ADMIN
