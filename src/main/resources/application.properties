# ─── Profiles ───────────────────────────────────────────────────────────────────
# Bare local runs default to "dev" (working defaults, ddl-auto=update).
# Production MUST set SPRING_PROFILES_ACTIVE=prod — outside dev/test, SecretsGuard
# refuses to start on missing or well-known credentials. (AUDIT P0-2 / P0-3)
spring.profiles.default=dev

# ─── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sudokupro}
spring.datasource.username=${DB_USERNAME:postgres}
# No fallback: outside the dev profile the password must be provided explicitly.
spring.datasource.password=${DB_PASSWORD:}

# DDL strategy: "validate" so Hibernate never silently alters a production schema.
# The dev profile overrides this to "update" for local iteration. (AUDIT P0-3)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── Redis ──────────────────────────────────────────────────────────────────────
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# ─── Firebase Cloud Messaging ──────────────────────────────────────────────────
# Leave blank to disable push notifications (e.g. local dev without FCM credentials).
# NOTE: the legacy server-key API this targets was shut down by Google — see AUDIT P1-5.
fcm.server-key=${FCM_SERVER_KEY:}

# ─── Spring Security default user ───────────────────────────────────────────────
# No fallback password: outside the dev profile ADMIN_PASSWORD must be provided
# explicitly and must not be a well-known value. In production remove these
# entirely and provision real accounts via the DB.
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:}
spring.security.user.roles=ADMIN
