# ─── Profiles ───────────────────────────────────────────────────────────────────
# Bare local runs default to "dev" (working defaults, ddl-auto=update).
# Production MUST set SPRING_PROFILES_ACTIVE=prod — outside dev/test, SecretsGuard
# refuses to start on missing or well-known credentials. (AUDIT P0-2 / P0-3)
spring.profiles.default=dev

# ─── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sudokupro}
spring.datasource.username=${DB_USERNAME:postgres}
# No fallback: outside the dev profile the password must be provided explicitly.
spring.datasource.password=${DB_PASSWORD:}

# DDL strategy: "validate" so Hibernate never silently alters a production schema.
# Flyway owns the schema (see db/migration). The dev profile disables Flyway and
# uses ddl-auto=update for local iteration. (AUDIT P0-3)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/{vendor}
# Existing pre-Flyway databases: mark V1 (baseline schema) as already applied and
# run V2+ only. Fresh databases run everything.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── Redis ──────────────────────────────────────────────────────────────────────
# Boot 3 canonical namespace (spring.data.redis.*) — the old spring.redis.* keys
# were silently ignored by autoconfiguration. (AUDIT P1-4)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# ─── Spring Security default user ───────────────────────────────────────────────
# No fallback password: outside the dev profile ADMIN_PASSWORD must be provided
# explicitly and must not be a well-known value. In production remove these
# entirely and provision real accounts via the DB.
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:}
spring.security.user.roles=ADMIN
