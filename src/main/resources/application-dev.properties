# Postgres. SecretsGuard is disabled in this profile; production must set
# SPRING_PROFILES_ACTIVE=prod and provide real credentials. (AUDIT P0-2 / P0-3)

spring.datasource.password=${DB_PASSWORD:sudoku123}
spring.security.user.password=${ADMIN_PASSWORD:secret}

# Local iteration convenience only — production stays on "validate".
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
