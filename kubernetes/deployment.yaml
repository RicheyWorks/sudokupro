# SudokuPro server deployment. (AUDIT P1-6)
#
# Prerequisites:
#   - Image built from the repo Dockerfile and pushed to your registry
#     (update spec.template.spec.containers[0].image below).
#   - Secret with real credentials (SecretsGuard refuses weak/missing values):
#       kubectl create secret generic sudokupro-secrets \
#         --from-literal=DB_PASSWORD='...' --from-literal=ADMIN_PASSWORD='...'
#   - Postgres reachable as "postgres:5432" and Redis as "redis:6379"
#     (adjust DB_URL / REDIS_HOST for your environment).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sudokupro
  labels:
    app: sudokupro
spec:
  # Multi-replica ready (Phase 5): boards are Redis/DB-backed with per-pod
  # caching, player streaks/points/input-locks live in Redis (PlayerStateStore),
  # game mutations take a cross-replica Redis lock (GameLockManager), and
  # WebSocket broadcasts fan out to all pods via Redis pub/sub
  # (RedisBroadcastRelay). Requires a healthy shared Redis — without one,
  # pods degrade to independent single-replica behavior. Start at 1 and scale
  # once Redis is provisioned.
  replicas: 1
  selector:
    matchLabels:
      app: sudokupro
  template:
    metadata:
      labels:
        app: sudokupro
    spec:
      # Pod-level hardening: matches the Dockerfile's non-root runtime user
      # (uid 1001, "sudokupro") and drops everything a game server doesn't need.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sudokupro
          image: REGISTRY/sudokupro:latest  # ← set to your registry/tag
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          volumeMounts:
            # Spring Boot/Tomcat need a writable temp dir; everything else about
            # the image is read-only at runtime.
            - name: tmp
              mountPath: /tmp
          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/sudokupro
            - name: DB_USERNAME
              value: postgres
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: DDL_AUTO
              value: validate
            - name: ADMIN_USERNAME
              value: admin
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sudokupro-secrets
                  key: DB_PASSWORD
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sudokupro-secrets
                  key: ADMIN_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: tmp
          emptyDir: {}
