<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SudokuPro — Play</title>
<style>
  :root { --bg:#0b0b14; --panel:#15152a; --accent:#7b5cff; --gold:#ffd700; --cyan:#00ffff; --text:#e8e8f0; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text);
         display:flex; flex-direction:column; align-items:center; min-height:100vh; }
  h1 { color:var(--gold); letter-spacing:2px; margin:24px 0 8px; }
  .panel { background:var(--panel); border-radius:12px; padding:20px; margin:10px; width:min(480px,94vw); }
  input, select { width:100%; padding:10px; margin:6px 0; border-radius:8px; border:1px solid #333;
          background:#0f0f20; color:var(--text); font-size:15px; }
  button { padding:10px 16px; margin:6px 4px 0 0; border:none; border-radius:8px; cursor:pointer;
           background:var(--accent); color:white; font-size:14px; font-weight:600; }
  button.secondary { background:#2e2e5e; }
  button:disabled { opacity:.5; cursor:default; }
  #status { min-height:22px; margin-top:8px; font-size:14px; }
  #status.err { color:#ff6b6b; } #status.ok { color:#6bffa0; }
  #game { display:none; flex-direction:column; align-items:center; }
  #hud { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; font-size:14px; margin:8px 0; }
  #hud span b { color:var(--cyan); }
  #board { display:grid; grid-template-columns:repeat(9,minmax(30px,44px)); user-select:none; margin:10px 0;
           border:3px solid var(--accent); }
  .cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:20px;
          border:1px solid #2a2a44; cursor:pointer; background:#101024; }
  .cell.given { color:var(--gold); font-weight:700; background:#181834; cursor:default; }
  .cell.sel { outline:3px solid var(--cyan); outline-offset:-3px; }
  .cell.b-right { border-right:3px solid var(--accent); }
  .cell.b-bottom { border-bottom:3px solid var(--accent); }
  #pad { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  #pad button { min-width:40px; }
  #log { font-size:13px; color:#9a9ab8; max-width:480px; max-height:120px; overflow-y:auto; margin-top:8px; }
</style>
</head>
<body>
  <h1>SUDOKUPRO</h1>

  <div class="panel" id="login">
    <input id="server" value="" placeholder="Server (default: this origin)">
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button id="btnLogin">Log in &amp; Play</button>
    <button id="btnRegister" class="secondary">Register</button>
    <div id="status"></div>
  </div>

  <div id="game">
    <div class="panel">
      <div id="hud">
        <span>Player <b id="hudPlayer">–</b></span>
        <span>Gems <b id="hudGems">–</b></span>
        <span>Moves <b id="hudMoves">0</b></span>
        <span>Streak <b id="hudStreak">–</b></span>
      </div>
      <div style="display:flex; gap:6px; flex-wrap:wrap;">
        <select id="difficulty" style="width:auto;flex:1">
          <option value="1">Easy</option><option value="2" selected>Medium</option>
          <option value="3">Hard</option><option value="4">Insane</option>
        </select>
        <button id="btnNew">New Game</button>
        <button id="btnDaily" class="secondary">Daily</button>
        <button id="btnHint" class="secondary">Hint</button>
      </div>
    </div>
    <div id="board"></div>
    <div id="pad"></div>
    <div id="log"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
